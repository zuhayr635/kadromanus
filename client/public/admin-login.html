<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<title>Kadrokur — Lisans Paneli Girişi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'DM Sans',system-ui,sans-serif;
    background:#080c09;
    color:#F8F6F3;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .wrap {
    width:100%;
    max-width:380px;
    padding:1.5rem;
  }
  .logo {
    text-align:center;
    margin-bottom:2.5rem;
  }
  .logo-title {
    font-family:'Cormorant Garamond',serif;
    font-size:2rem;
    font-weight:600;
    letter-spacing:0.12em;
    color:#D4AF37;
  }
  .logo-sub {
    font-size:0.6rem;
    font-weight:500;
    color:rgba(212,175,55,0.45);
    letter-spacing:0.25em;
    text-transform:uppercase;
    margin-top:4px;
  }
  .card {
    background:#0c1309;
    border:1px solid rgba(212,175,55,0.12);
    padding:2.5rem 2rem;
  }
  label {
    display:block;
    font-size:0.6rem;
    font-weight:500;
    letter-spacing:0.18em;
    color:rgba(212,175,55,0.6);
    text-transform:uppercase;
    margin-bottom:0.5rem;
  }
  input {
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid rgba(212,175,55,0.2);
    color:#F8F6F3;
    padding:0.6rem 0;
    font-size:0.9rem;
    font-family:'DM Sans',sans-serif;
    outline:none;
    margin-bottom:1.5rem;
    transition:border-color 0.2s;
  }
  input:focus {
    border-bottom-color:rgba(212,175,55,0.6);
  }
  button[type="submit"] {
    width:100%;
    background:#D4AF37;
    border:1px solid #D4AF37;
    color:#080c09;
    font-family:'DM Sans',sans-serif;
    font-size:0.75rem;
    font-weight:500;
    letter-spacing:0.15em;
    text-transform:uppercase;
    padding:0.75rem;
    cursor:pointer;
    transition:background 0.2s, color 0.2s;
  }
  button[type="submit"]:hover {
    background:transparent;
    color:#D4AF37;
  }
  .error {
    display:none;
    margin-top:1rem;
    padding:0.6rem 0.75rem;
    background:rgba(127,29,29,0.15);
    border:1px solid rgba(127,29,29,0.5);
    color:#fca5a5;
    font-size:0.78rem;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <img src="/logo.svg" alt="Kadrokur" style="width:64px;height:64px;margin-bottom:1rem">
    <div class="logo-title">KADROKUR</div>
    <div class="logo-sub">Lisans Yönetim Paneli</div>
  </div>
  <div class="card">
    <form id="loginForm">
      <label for="email">E-posta</label>
      <input type="email" id="email" name="email" autocomplete="email" placeholder="admin@example.com" required>
      <label for="password">Şifre</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit">Giriş Yap</button>
      <div class="error" id="errorMsg">Hatalı e-posta veya şifre.</div>
    </form>
  </div>
</div>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.style.display = 'none';

    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      if (res.ok) {
        location.href = '/licensepanel';
      } else {
        errorMsg.style.display = 'block';
      }
    } catch {
      errorMsg.textContent = 'Bağlantı hatası. Lütfen tekrar deneyin.';
      errorMsg.style.display = 'block';
    }
  });
</script>
</body>
</html>
