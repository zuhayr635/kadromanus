<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadrokur - Yayıncı Kontrol Paneli</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      padding: 30px;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: #667eea;
      border-radius: 2px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      margin-bottom: 8px;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .team-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    @media (max-width: 600px) {
      .team-inputs {
        grid-template-columns: 1fr;
      }
    }

    .mode-selector {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .mode-option {
      flex: 1;
    }

    .mode-option input[type="radio"] {
      display: none;
    }

    .mode-option label {
      display: block;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 0;
    }

    .mode-option input[type="radio"]:checked + label {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
      font-weight: 600;
      color: #667eea;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 30px;
    }

    @media (max-width: 600px) {
      .button-group {
        grid-template-columns: 1fr;
      }
    }

    button {
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-danger {
      background: #ff6b6b;
      color: white;
      grid-column: 1 / -1;
    }

    .btn-danger:hover {
      background: #ff5252;
    }

    .status-box {
      background: #f5f5f5;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .status-box.success {
      border-left-color: #4caf50;
      background: #f1f8f4;
    }

    .status-box.error {
      border-left-color: #ff6b6b;
      background: #fef5f5;
    }

    .status-box.warning {
      border-left-color: #ffa500;
      background: #fffaf0;
    }

    .status-text {
      font-size: 14px;
      color: #666;
      margin: 0;
    }

    .status-box.success .status-text {
      color: #2e7d32;
    }

    .status-box.error .status-text {
      color: #c62828;
    }

    .status-box.warning .status-text {
      color: #f57c00;
    }

    .session-info {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 6px;
      margin-top: 20px;
      display: none;
    }

    .session-info.active {
      display: block;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
      font-size: 14px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-weight: 600;
      color: #555;
    }

    .info-value {
      color: #667eea;
      font-weight: 500;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      border: 3px solid #f0f0f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚽ Kadrokur</h1>
      <p>TikTok Live Futbol Kartları Oyunu - Yayıncı Kontrol Paneli</p>
    </div>

    <div class="content">
      <!-- Status Messages -->
      <div id="statusBox" class="status-box" style="display: none;"></div>

      <!-- Lisans Doğrulama Formu -->
      <form id="sessionForm">
        <div class="section">
          <div class="section-title">Lisans Bilgileri</div>
          <div class="form-group">
            <label for="licenseKey">Lisans Anahtarı</label>
            <input
              type="text"
              id="licenseKey"
              placeholder="Lisans anahtarınızı girin"
              required
            />
          </div>
        </div>

        <!-- TikTok Bilgileri -->
        <div class="section">
          <div class="section-title">TikTok Bilgileri</div>
          <div class="form-group">
            <label for="tiktokUsername">TikTok Kullanıcı Adı</label>
            <input
              type="text"
              id="tiktokUsername"
              placeholder="@kullaniciadi"
              required
            />
          </div>
        </div>

        <!-- Takım Ayarları -->
        <div class="section">
          <div class="section-title">Takım Ayarları</div>
          <div class="form-group">
            <label>Takım Seçim Modu</label>
            <div class="mode-selector">
              <div class="mode-option">
                <input
                  type="radio"
                  id="modeManual"
                  name="teamSelectionMode"
                  value="manual"
                  checked
                />
                <label for="modeManual">
                  <strong>Manuel</strong><br>
                  <small>Panelden seçim</small>
                </label>
              </div>
              <div class="mode-option">
                <input
                  type="radio"
                  id="modeAutomatic"
                  name="teamSelectionMode"
                  value="automatic"
                />
                <label for="modeAutomatic">
                  <strong>Otomatik</strong><br>
                  <small>Chat komutları (!1, !2, ...)</small>
                </label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Takım Adları</label>
            <div class="team-inputs">
              <input
                type="text"
                id="team1"
                placeholder="Takım 1 Adı"
                value="Fenerbahçe"
                required
              />
              <input
                type="text"
                id="team2"
                placeholder="Takım 2 Adı"
                value="Galatasaray"
                required
              />
              <input
                type="text"
                id="team3"
                placeholder="Takım 3 Adı"
                value="Beşiktaş"
                required
              />
              <input
                type="text"
                id="team4"
                placeholder="Takım 4 Adı"
                value="Trabzonspor"
                required
              />
            </div>
          </div>
        </div>

        <!-- Kontrol Butonları -->
        <div class="button-group">
          <button type="submit" class="btn-primary">Oturumu Başlat</button>
          <button type="button" class="btn-secondary" id="stopBtn" style="display: none;">Oturumu Durdur</button>
          <button type="button" class="btn-danger" id="endBtn" style="display: none;">Oturumu Sonlandır</button>
        </div>
      </form>

      <!-- Oturum Bilgileri -->
      <div id="sessionInfo" class="session-info">
        <div class="info-row">
          <span class="info-label">Oturum ID:</span>
          <span class="info-value" id="sessionIdDisplay">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">TikTok Kullanıcısı:</span>
          <span class="info-value" id="tiktokDisplay">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Takım Seçim Modu:</span>
          <span class="info-value" id="modeDisplay">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Takımlar:</span>
          <span class="info-value" id="teamsDisplay">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Durum:</span>
          <span class="info-value" id="statusDisplay">-</span>
        </div>
      </div>

      <!-- Loading -->
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>İşlem yapılıyor...</p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('sessionForm');
    const statusBox = document.getElementById('statusBox');
    const sessionInfo = document.getElementById('sessionInfo');
    const loading = document.getElementById('loading');
    const stopBtn = document.getElementById('stopBtn');
    const endBtn = document.getElementById('endBtn');

    let currentSession = null;

    function showStatus(message, type = 'info') {
      statusBox.textContent = message;
      statusBox.className = `status-box ${type}`;
      statusBox.style.display = 'block';
    }

    function showLoading(show = true) {
      loading.classList.toggle('active', show);
    }

    function displaySessionInfo(session) {
      document.getElementById('sessionIdDisplay').textContent = session.sessionId;
      document.getElementById('tiktokDisplay').textContent = session.tiktokUsername;
      document.getElementById('modeDisplay').textContent = 
        session.teamSelectionMode === 'manual' ? 'Manuel' : 'Otomatik';
      document.getElementById('teamsDisplay').textContent = session.teamNames.join(', ');
      document.getElementById('statusDisplay').textContent = 'Aktif';
      
      sessionInfo.classList.add('active');
      form.style.display = 'none';
      stopBtn.style.display = 'block';
      endBtn.style.display = 'block';
    }

    function hideSessionInfo() {
      sessionInfo.classList.remove('active');
      form.style.display = 'block';
      stopBtn.style.display = 'none';
      endBtn.style.display = 'none';
      form.reset();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const licenseKey = document.getElementById('licenseKey').value;
      const tiktokUsername = document.getElementById('tiktokUsername').value;
      const teamSelectionMode = document.querySelector('input[name="teamSelectionMode"]:checked').value;
      const teamNames = [
        document.getElementById('team1').value,
        document.getElementById('team2').value,
        document.getElementById('team3').value,
        document.getElementById('team4').value,
      ];

      showLoading(true);

      try {
        const response = await fetch('/api/broadcaster/session/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            licenseKey,
            tiktokUsername,
            teamSelectionMode,
            teamNames,
          }),
        });

        const data = await response.json();

        if (data.success) {
          currentSession = {
            sessionId: data.sessionId,
            tiktokUsername,
            teamSelectionMode,
            teamNames,
          };
          showStatus('Oturum başarıyla oluşturuldu!', 'success');
          displaySessionInfo(currentSession);
        } else {
          showStatus(data.message || 'Oturum oluşturma başarısız', 'error');
        }
      } catch (error) {
        showStatus('Hata: ' + error.message, 'error');
      } finally {
        showLoading(false);
      }
    });

    stopBtn.addEventListener('click', async () => {
      if (!currentSession) return;

      showLoading(true);

      try {
        const response = await fetch('/api/broadcaster/session/stop', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: currentSession.sessionId }),
        });

        const data = await response.json();

        if (data.success) {
          showStatus('Oturum durduruldu', 'success');
          hideSessionInfo();
          currentSession = null;
        } else {
          showStatus(data.message || 'Oturum durdurma başarısız', 'error');
        }
      } catch (error) {
        showStatus('Hata: ' + error.message, 'error');
      } finally {
        showLoading(false);
      }
    });

    endBtn.addEventListener('click', async () => {
      if (!currentSession) return;

      if (!confirm('Oturumu sonlandırmak istediğinizden emin misiniz?')) return;

      showLoading(true);

      try {
        const response = await fetch('/api/broadcaster/session/end', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: currentSession.sessionId }),
        });

        const data = await response.json();

        if (data.success) {
          showStatus('Oturum sonlandırıldı', 'success');
          hideSessionInfo();
          currentSession = null;
        } else {
          showStatus(data.message || 'Oturum sonlandırma başarısız', 'error');
        }
      } catch (error) {
        showStatus('Hata: ' + error.message, 'error');
      } finally {
        showLoading(false);
      }
    });
  </script>
</body>
</html>
