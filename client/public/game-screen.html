<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadrokur - Oyun Ekranı</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    .game-container {
      width: 1920px;
      height: 1080px;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .header {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      text-align: center;
      border-bottom: 3px solid #00d4ff;
    }

    .header h1 {
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .header p {
      font-size: 24px;
      opacity: 0.9;
    }

    .game-content {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
      padding: 30px;
      align-items: center;
    }

    .team-section {
      background: rgba(0, 0, 0, 0.2);
      border: 3px solid #00d4ff;
      border-radius: 10px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      min-height: 400px;
    }

    .team-header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #00d4ff;
      padding-bottom: 15px;
    }

    .team-name {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .team-score {
      font-size: 28px;
      color: #00ff00;
      font-weight: bold;
    }

    .players-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .player-card {
      background: rgba(0, 212, 255, 0.1);
      border: 2px solid #00d4ff;
      border-radius: 6px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn 0.5s ease-out;
    }

    .player-card.bronze {
      border-color: #cd7f32;
      background: rgba(205, 127, 50, 0.1);
    }

    .player-card.silver {
      border-color: #c0c0c0;
      background: rgba(192, 192, 192, 0.1);
    }

    .player-card.gold {
      border-color: #ffd700;
      background: rgba(255, 215, 0, 0.1);
    }

    .player-card.elite {
      border-color: #ff1493;
      background: rgba(255, 20, 147, 0.1);
    }

    .player-info {
      flex: 1;
    }

    .player-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .player-position {
      font-size: 12px;
      opacity: 0.8;
    }

    .player-quality {
      font-size: 12px;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
    }

    .player-quality.bronze {
      color: #cd7f32;
    }

    .player-quality.silver {
      color: #c0c0c0;
    }

    .player-quality.gold {
      color: #ffd700;
    }

    .player-quality.elite {
      color: #ff1493;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .card-opening-animation {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      pointer-events: none;
    }

    .card {
      width: 200px;
      height: 300px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      animation: cardFlip 1s ease-in-out;
    }

    @keyframes cardFlip {
      0% {
        transform: rotateY(0deg) scale(0.5);
        opacity: 0;
      }
      50% {
        transform: rotateY(90deg) scale(1);
      }
      100% {
        transform: rotateY(0deg) scale(1);
        opacity: 1;
      }
    }

    .footer {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      text-align: center;
      border-top: 3px solid #00d4ff;
      font-size: 18px;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-top: 10px;
      font-size: 16px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-label {
      opacity: 0.8;
    }

    .stat-value {
      font-weight: bold;
      color: #00ff00;
    }

    .final-scores {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeIn 0.5s ease-out;
    }

    .final-scores.active {
      display: flex;
    }

    .final-scores-content {
      text-align: center;
    }

    .final-scores-title {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 40px;
      color: #00ff00;
    }

    .final-scores-table {
      font-size: 32px;
      margin-bottom: 40px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      gap: 100px;
      margin: 20px 0;
      padding: 15px;
      background: rgba(0, 212, 255, 0.1);
      border-radius: 10px;
      min-width: 600px;
    }

    .score-rank {
      font-weight: bold;
      color: #ffd700;
      min-width: 100px;
    }

    .score-team {
      font-weight: bold;
      min-width: 200px;
    }

    .score-points {
      color: #00ff00;
      font-weight: bold;
      min-width: 150px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Scrollbar styling */
    .players-list::-webkit-scrollbar {
      width: 8px;
    }

    .players-list::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }

    .players-list::-webkit-scrollbar-thumb {
      background: #00d4ff;
      border-radius: 10px;
    }

    .players-list::-webkit-scrollbar-thumb:hover {
      background: #00ffff;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="header">
      <h1>⚽ KADROKUR - TikTok Live Futbol Kartları</h1>
      <p id="sessionInfo">Oturum: Yükleniyor...</p>
    </div>

    <div class="game-content" id="gameContent">
      <!-- Teams will be dynamically inserted here -->
    </div>

    <div class="footer">
      <div class="stats">
        <div class="stat-item">
          <span class="stat-label">Açılan Kartlar:</span>
          <span class="stat-value" id="totalCards">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Katılımcılar:</span>
          <span class="stat-value" id="totalParticipants">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Beğeni:</span>
          <span class="stat-value" id="totalLikes">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Hediye:</span>
          <span class="stat-value" id="totalGifts">0</span>
        </div>
      </div>
    </div>

    <div class="final-scores" id="finalScores">
      <div class="final-scores-content">
        <div class="final-scores-title">🏆 OYUN BİTTİ 🏆</div>
        <div class="final-scores-table" id="scoresTable"></div>
      </div>
    </div>
  </div>

  <div class="card-opening-animation" id="cardAnimation"></div>

  <script>
    const gameContent = document.getElementById('gameContent');
    const sessionInfo = document.getElementById('sessionInfo');
    const finalScores = document.getElementById('finalScores');
    const scoresTable = document.getElementById('scoresTable');
    const cardAnimation = document.getElementById('cardAnimation');

    let gameState = null;
    let socket = null;

    // Get session ID from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('sessionId');

    function initializeGameScreen() {
      if (!sessionId) {
        sessionInfo.textContent = 'Oturum ID bulunamadı';
        return;
      }

      sessionInfo.textContent = `Oturum: ${sessionId}`;

      // Initialize Socket.io connection
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const socketUrl = `${protocol}//${window.location.host}`;
      
      // Note: Socket.io setup would go here
      // For now, we'll use polling to simulate real-time updates
      setupPolling();
    }

    function setupPolling() {
      // Simulate real-time updates
      setInterval(async () => {
        try {
          const response = await fetch(`/api/game/state?sessionId=${sessionId}`);
          if (response.ok) {
            const data = await response.json();
            updateGameScreen(data);
          }
        } catch (error) {
          console.error('Error fetching game state:', error);
        }
      }, 500);
    }

    function updateGameScreen(state) {
      if (!state || !state.teams) return;

      gameState = state;

      // Update team sections
      if (gameContent.children.length === 0) {
        renderTeams(state.teams);
      }

      // Update teams with new players
      state.teams.forEach((team, idx) => {
        const teamSection = document.querySelectorAll('.team-section')[idx];
        if (teamSection) {
          updateTeamSection(teamSection, team);
        }
      });

      // Update stats
      document.getElementById('totalCards').textContent = state.openedCards?.length || 0;
      document.getElementById('totalParticipants').textContent = state.participants?.size || 0;
      document.getElementById('totalLikes').textContent = state.totalLikes || 0;
      document.getElementById('totalGifts').textContent = state.totalGifts || 0;

      // Check if game is complete
      if (state.isComplete) {
        showFinalScores(state.teams);
      }
    }

    function renderTeams(teams) {
      gameContent.innerHTML = '';

      teams.forEach((team) => {
        const teamSection = document.createElement('div');
        teamSection.className = 'team-section';
        teamSection.innerHTML = `
          <div class="team-header">
            <div class="team-name">${team.name}</div>
            <div class="team-score">Skor: <span id="score-${team.id}">${team.score}</span></div>
          </div>
          <div class="players-list" id="players-${team.id}"></div>
        `;
        gameContent.appendChild(teamSection);
      });
    }

    function updateTeamSection(teamSection, team) {
      const scoreElement = teamSection.querySelector(`#score-${team.id}`);
      if (scoreElement) {
        scoreElement.textContent = team.score;
      }

      const playersList = teamSection.querySelector(`#players-${team.id}`);
      if (playersList) {
        const currentPlayers = playersList.querySelectorAll('.player-card').length;
        
        // Add new players
        team.players.slice(currentPlayers).forEach((player) => {
          const playerCard = document.createElement('div');
          playerCard.className = `player-card ${player.quality}`;
          playerCard.innerHTML = `
            <div class="player-info">
              <div class="player-name">${player.name}</div>
              <div class="player-position">${player.position}</div>
            </div>
            <div class="player-quality ${player.quality}">
              ${player.quality.toUpperCase()}
            </div>
          `;
          playersList.appendChild(playerCard);

          // Trigger card animation
          animateCardOpening(player.quality);
        });
      }
    }

    function animateCardOpening(quality) {
      const colors = {
        bronze: '#cd7f32',
        silver: '#c0c0c0',
        gold: '#ffd700',
        elite: '#ff1493',
      };

      const card = document.createElement('div');
      card.className = 'card';
      card.style.background = colors[quality] || '#667eea';
      card.textContent = quality.toUpperCase();

      cardAnimation.innerHTML = '';
      cardAnimation.appendChild(card);

      setTimeout(() => {
        cardAnimation.innerHTML = '';
      }, 1000);
    }

    function showFinalScores(teams) {
      const sortedTeams = [...teams].sort((a, b) => b.score - a.score);

      let scoresHTML = '';
      sortedTeams.forEach((team, idx) => {
        const medals = ['🥇', '🥈', '🥉', '4️⃣'];
        scoresHTML += `
          <div class="score-row">
            <div class="score-rank">${medals[idx] || idx + 1}.</div>
            <div class="score-team">${team.name}</div>
            <div class="score-points">${team.score} Puan</div>
          </div>
        `;
      });

      scoresTable.innerHTML = scoresHTML;
      finalScores.classList.add('active');
    }

    // Initialize when page loads
    window.addEventListener('load', initializeGameScreen);
  </script>
</body>
</html>
