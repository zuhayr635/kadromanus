<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadrokur - Lisans Yönetimi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      font-size: 32px;
      color: #333;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 16px;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 30px;
    }

    @media (max-width: 1024px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title::before {
      content: '';
      width: 4px;
      height: 24px;
      background: #667eea;
      border-radius: 2px;
    }

    .package-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .package-item {
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .package-item:hover {
      border-color: #667eea;
      background: #f9f9ff;
    }

    .package-item.active {
      border-color: #667eea;
      background: #f0f4ff;
    }

    .package-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }

    .package-price {
      font-size: 18px;
      color: #667eea;
      font-weight: bold;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-label {
      margin: 0;
      cursor: pointer;
      font-weight: normal;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 30px;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      grid-column: 1 / -1;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .status-box {
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .status-box.success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }

    .status-box.error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }

    .status-box.info {
      background: #d1ecf1;
      border: 1px solid #bee5eb;
      color: #0c5460;
    }

    .license-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .license-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .license-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .license-key {
      font-family: monospace;
      font-size: 12px;
      color: #666;
      background: white;
      padding: 5px 10px;
      border-radius: 4px;
    }

    .license-status {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      background: #d4edda;
      color: #155724;
    }

    .license-status.expired {
      background: #f8d7da;
      color: #721c24;
    }

    .license-details {
      font-size: 13px;
      color: #666;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
    }

    .detail-label {
      font-weight: 600;
    }

    .feature-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      background: #e3f2fd;
      color: #1976d2;
      margin-right: 5px;
      margin-top: 5px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab-button {
      padding: 12px 20px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-weight: 600;
      color: #666;
      transition: all 0.3s;
    }

    .tab-button:hover {
      color: #333;
    }

    .tab-button.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .spinner {
      border: 3px solid #f0f0f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💳 Kadrokur - Lisans Yönetimi</h1>
      <p>Paket türlerini, özellikleri ve sürelerini yönetin</p>
    </div>

    <div class="content">
      <!-- Sidebar: Package Selection -->
      <div class="card">
        <div class="card-title">📦 Paket Türleri</div>
        <div class="package-list" id="packageList">
          <div class="package-item active" data-package="basic">
            <div class="package-name">Basic</div>
            <div class="package-price">₺99/ay</div>
          </div>
          <div class="package-item" data-package="pro">
            <div class="package-name">Pro</div>
            <div class="package-price">₺299/ay</div>
          </div>
          <div class="package-item" data-package="premium">
            <div class="package-name">Premium</div>
            <div class="package-price">₺599/ay</div>
          </div>
          <div class="package-item" data-package="unlimited">
            <div class="package-name">Unlimited</div>
            <div class="package-price">₺999/ay</div>
          </div>
        </div>
      </div>

      <!-- Main Content: License Management -->
      <div class="card">
        <div id="statusBox" class="status-box" style="display: none;"></div>

        <div class="tabs">
          <button class="tab-button active" data-tab="create">Yeni Lisans</button>
          <button class="tab-button" data-tab="manage">Lisansları Yönet</button>
          <button class="tab-button" data-tab="features">Özellikleri Ayarla</button>
        </div>

        <!-- Tab 1: Create License -->
        <div class="tab-content active" id="createTab">
          <form id="licenseForm">
            <div class="form-group">
              <label>Paket Türü</label>
              <select id="packageType" required>
                <option value="">Seçiniz...</option>
                <option value="basic">Basic</option>
                <option value="pro">Pro</option>
                <option value="premium">Premium</option>
                <option value="unlimited">Unlimited</option>
              </select>
            </div>

            <div class="form-group">
              <label>Yayıncı Adı</label>
              <input type="text" id="broadcasterName" placeholder="Yayıncı adını girin" required />
            </div>

            <div class="form-group">
              <label>E-mail</label>
              <input type="email" id="broadcasterEmail" placeholder="E-mail adresini girin" required />
            </div>

            <div class="form-group">
              <label>Lisans Süresi (Gün)</label>
              <input type="number" id="licenseDuration" placeholder="30" value="30" min="1" required />
            </div>

            <div class="form-group">
              <label>Maksimum Eş Zamanlı Oturum</label>
              <input type="number" id="maxSessions" placeholder="1" value="1" min="1" required />
            </div>

            <div class="form-group">
              <label>Maksimum Oyuncu Sayısı</label>
              <input type="number" id="maxPlayers" placeholder="500" value="500" min="1" required />
            </div>

            <div class="button-group">
              <button type="submit" class="btn-primary">Lisans Oluştur</button>
              <button type="reset" class="btn-secondary">Temizle</button>
            </div>
          </form>
        </div>

        <!-- Tab 2: Manage Licenses -->
        <div class="tab-content" id="manageTab">
          <div id="licenseList" class="license-list">
            <div class="loading">
              <div class="spinner"></div>
              <p>Lisanslar yükleniyor...</p>
            </div>
          </div>
        </div>

        <!-- Tab 3: Feature Settings -->
        <div class="tab-content" id="featuresTab">
          <form id="featureForm">
            <div class="form-group">
              <label>Paket Seçin</label>
              <select id="featurePackage" required>
                <option value="">Seçiniz...</option>
                <option value="basic">Basic</option>
                <option value="pro">Pro</option>
                <option value="premium">Premium</option>
                <option value="unlimited">Unlimited</option>
              </select>
            </div>

            <div class="form-group">
              <label>Özellikler</label>
              <div class="checkbox-group">
                <div class="checkbox-item">
                  <input type="checkbox" id="feature_telegram" />
                  <label class="checkbox-label" for="feature_telegram">Telegram Bot Entegrasyonu</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="feature_auto_mode" />
                  <label class="checkbox-label" for="feature_auto_mode">Otomatik Takım Seçimi</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="feature_analytics" />
                  <label class="checkbox-label" for="feature_analytics">Gelişmiş Analitikler</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="feature_custom_teams" />
                  <label class="checkbox-label" for="feature_custom_teams">Özel Takım Adları</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="feature_multi_session" />
                  <label class="checkbox-label" for="feature_multi_session">Çoklu Oturum Desteği</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="feature_api_access" />
                  <label class="checkbox-label" for="feature_api_access">API Erişimi</label>
                </div>
              </div>
            </div>

            <div class="button-group">
              <button type="submit" class="btn-primary">Özellikleri Kaydet</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    const packageList = document.getElementById('packageList');
    const licenseForm = document.getElementById('licenseForm');
    const featureForm = document.getElementById('featureForm');
    const statusBox = document.getElementById('statusBox');
    const tabs = document.querySelectorAll('.tab-button');
    const tabContents = document.querySelectorAll('.tab-content');

    let selectedPackage = 'basic';

    // Package selection
    packageList.addEventListener('click', (e) => {
      const item = e.target.closest('.package-item');
      if (!item) return;

      document.querySelectorAll('.package-item').forEach(p => p.classList.remove('active'));
      item.classList.add('active');
      selectedPackage = item.dataset.package;
      document.getElementById('packageType').value = selectedPackage;
    });

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));
        
        tab.classList.add('active');
        const tabId = tab.dataset.tab + 'Tab';
        document.getElementById(tabId).classList.add('active');
      });
    });

    // License form submission
    licenseForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        packageType: document.getElementById('packageType').value,
        broadcasterName: document.getElementById('broadcasterName').value,
        broadcasterEmail: document.getElementById('broadcasterEmail').value,
        licenseDuration: parseInt(document.getElementById('licenseDuration').value),
        maxSessions: parseInt(document.getElementById('maxSessions').value),
        maxPlayers: parseInt(document.getElementById('maxPlayers').value),
      };

      try {
        const response = await fetch('/api/license/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const result = await response.json();

        if (result.success) {
          showStatus('Lisans başarıyla oluşturuldu!', 'success');
          licenseForm.reset();
          loadLicenses();
        } else {
          showStatus(result.message || 'Lisans oluşturma başarısız', 'error');
        }
      } catch (error) {
        showStatus('Hata: ' + error.message, 'error');
      }
    });

    // Feature form submission
    featureForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const features = {
        telegram: document.getElementById('feature_telegram').checked,
        autoMode: document.getElementById('feature_auto_mode').checked,
        analytics: document.getElementById('feature_analytics').checked,
        customTeams: document.getElementById('feature_custom_teams').checked,
        multiSession: document.getElementById('feature_multi_session').checked,
        apiAccess: document.getElementById('feature_api_access').checked,
      };

      try {
        const response = await fetch('/api/license/features', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            packageType: document.getElementById('featurePackage').value,
            features,
          }),
        });

        const result = await response.json();

        if (result.success) {
          showStatus('Özellikler başarıyla kaydedildi!', 'success');
        } else {
          showStatus(result.message || 'Özellik kaydetme başarısız', 'error');
        }
      } catch (error) {
        showStatus('Hata: ' + error.message, 'error');
      }
    });

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = `status-box ${type}`;
      statusBox.style.display = 'block';

      setTimeout(() => {
        statusBox.style.display = 'none';
      }, 5000);
    }

    async function loadLicenses() {
      try {
        const response = await fetch('/api/license/list');
        const licenses = await response.json();

        const licenseList = document.getElementById('licenseList');
        licenseList.innerHTML = '';

        if (licenses.length === 0) {
          licenseList.innerHTML = '<p style="color: #666;">Henüz lisans oluşturulmamış</p>';
          return;
        }

        licenses.forEach(license => {
          const item = document.createElement('div');
          item.className = 'license-item';
          item.innerHTML = `
            <div class="license-header">
              <div class="license-key">Anahtar: ${license.key}</div>
              <div class="license-status ${license.isExpired ? 'expired' : ''}">
                ${license.isExpired ? 'Süresi Doldu' : 'Aktif'}
              </div>
            </div>
            <div class="license-details">
              <div class="detail-row">
                <span class="detail-label">Paket:</span>
                <span>${license.packageType}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Yayıncı:</span>
                <span>${license.broadcasterName}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Bitiş Tarihi:</span>
                <span>${new Date(license.expiresAt).toLocaleDateString('tr-TR')}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Max Oturum:</span>
                <span>${license.maxSessions}</span>
              </div>
            </div>
            <div style="margin-top: 10px;">
              ${license.features.map(f => `<span class="feature-badge">${f}</span>`).join('')}
            </div>
          `;
          licenseList.appendChild(item);
        });
      } catch (error) {
        console.error('Lisanslar yüklenirken hata:', error);
      }
    }

    // Load licenses on page load
    window.addEventListener('load', loadLicenses);
  </script>
</body>
</html>
